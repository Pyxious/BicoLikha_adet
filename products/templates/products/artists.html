{% extends 'products/base.html' %}

{% block content %}
<style>
    .artists-container {
        position: relative;
        padding: 0 80px; /* Increased padding to compress the center */
        margin-top: 50px;
        min-height: 500px;
    }

    /* Arrow Buttons - Smaller and matching theme */
    .nav-arrow {
        position: absolute;
        top: 35%;
        transform: translateY(-50%);
        font-size: 2.5rem; /* Smaller arrows */
        color: var(--nav-brown);
        background: none;
        border: none;
        cursor: pointer;
        z-index: 10;
        transition: 0.3s;
    }
    .nav-arrow:disabled { opacity: 0.1; cursor: default; }
    .nav-arrow:hover:not(:disabled) { color: var(--bicol-green); transform: translateY(-50%) scale(1.1); }
    .left-arrow { left: 10px; }
    .right-arrow { right: 10px; }

    /* Hidden by default for JS pagination */
    .artist-item { display: none; } 

    .artist-card {
        text-align: center;
        text-decoration: none;
        color: var(--text-brown);
        display: block;
        margin-bottom: 20px;
    }

    /* THE FIX: Smaller fixed-size or max-width containers */
    .artist-avatar {
        width: 100%;
        max-width: 180px; /* Limits the size on large screens */
        aspect-ratio: 1/1;
        background-color: #e6e6e6; /* Match the gray from mockup */
        border: 2.5px solid var(--nav-brown);
        border-radius: 40px; /* Match the curved corners */
        margin: 0 auto; /* Centers the small box inside the column */
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.3s;
    }

    .artist-card:hover .artist-avatar {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .artist-avatar i {
        font-size: 3rem;
        color: #fff; /* White icon inside gray box */
    }

    .artist-name {
        margin-top: 15px;
        font-weight: 700;
        font-size: 1rem;
        color: var(--text-brown);
        letter-spacing: 0.5px;
    }
</style>

<div class="container mt-5">
    <div class="artists-container">
        <!-- Navigation Arrows -->
        <button class="nav-arrow left-arrow" id="prevBtn" onclick="changePage(-1)">
            <i class="fas fa-caret-left"></i>
        </button>
        
        <!-- Updated Grid: col-lg-3 makes them smaller by fitting 4 per row on desktop -->
        <div class="row g-4 justify-content-center" id="artist-grid">
            {% for artist in artists %}
<div class="col-6 col-md-4 col-lg-3 artist-item text-center">
    <!-- 1. UPDATED LINK: Points to the new artist detail page -->
    <a href="{% url 'artist_detail' artist.artist_id %}" class="artist-card">
        <div class="artist-avatar">
            {% if artist.artist_image_url %}
                <img src="{{ artist.artist_image_url }}" class="w-100 h-100" style="object-fit: cover;" alt="{{ artist.artist_name }}">
            {% else %}
                <i class="fas fa-user"></i>
            {% endif %}
        </div>
        <div class="artist-name">{{ artist.artist_name }}</div>
    </a>
</div>
{% endfor %}
        </div>

        <button class="nav-arrow right-arrow" id="nextBtn" onclick="changePage(1)">
            <i class="fas fa-caret-right"></i>
        </button>
    </div>
</div>

<script>
    let currentPage = 0;
    const pageSize = 8; // Shows 2 rows of 4
    const artistItems = document.querySelectorAll('.artist-item');
    const totalPages = Math.ceil(artistItems.length / pageSize);

    function showPage(page) {
        const start = page * pageSize;
        const end = start + pageSize;

        artistItems.forEach((item, index) => {
            item.style.display = (index >= start && index < end) ? 'block' : 'none';
        });

        document.getElementById('prevBtn').disabled = (page === 0);
        document.getElementById('nextBtn').disabled = (page === totalPages - 1 || totalPages === 0);
    }

    function changePage(step) {
        currentPage += step;
        showPage(currentPage);
    }

    document.addEventListener('DOMContentLoaded', () => {
        showPage(0);
    });
</script>
{% endblock %}
